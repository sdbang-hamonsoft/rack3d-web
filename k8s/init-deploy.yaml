apiVersion: v1
kind: Namespace
metadata:
  name: rack3d
  labels:
    name: rack3d
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rack3d-web
  namespace: rack3d
  labels:
    app: rack3d-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rack3d-web
  template:
    metadata:
      labels:
        app: rack3d-web
    spec:
      containers:
        - name: rack3d-web
          # 배포 스크립트(deploy.sh) 작동 전 초기화를 위한 기본 이미지 경로
          image: 10.1.20.21:5000/rack3d-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: rack3d-web-np
  namespace: rack3d
  labels:
    app: rack3d-web
spec:
  type: NodePort
  selector:
    app: rack3d-web
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30303
